name: vinstub-api
region: nyc

# Web service handles all public traffic at /
# API is accessed via its own service URL and through Next.js rewrites
ingress:
  rules:
  - component:
      name: vinstub
    match:
      path:
        prefix: /

services:
  # ─── API (Fastify) ───────────────────────────────────────────────────────────
  - name: vinstub-api
    github:
      repo: xgarrettx/vinstub
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    build_command: pnpm install --frozen-lockfile && pnpm --filter @vinstub/shared build && pnpm --filter @vinstub/api build
    run_command: node apps/api/dist/server.js
    http_port: 8080
    instance_count: 2
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /v1/health
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: REFRESH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: JWT_ACCESS_EXPIRY
        value: "900"
        scope: RUN_TIME
      - key: JWT_REFRESH_EXPIRY
        value: "604800"
        scope: RUN_TIME
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_BASIC
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_PREMIUM
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_ENTERPRISE
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM_ADDRESS
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM_NAME
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        scope: RUN_TIME
        type: SECRET
      - key: APP_BASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_TOTP_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET

  # ─── Web (Next.js) ───────────────────────────────────────────────────────────
  - name: vinstub
    dockerfile_path: apps/web/Dockerfile
    github:
      repo: xgarrettx/vinstub
      branch: main
      deploy_on_push: true
    source_dir: /
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb-fixed
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        type: SECRET
